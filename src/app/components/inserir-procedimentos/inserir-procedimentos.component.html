<p-dialog [visible]="this.visible"
          [modal]="true"
          [closable]="false"
          [draggable]="false" 
          class="medium-dialog">
    <ng-template pTemplate="header">
        <span class="header">Inserir Procedimentos</span>
    </ng-template>
    <ng-template pTemplate="body">
        <div class="d-flex flex-column mb-3">
            <span>Tabela</span>
            <p-select [options]="tabelaProcedimentos" 
                      [(ngModel)]="tabelaSelecionada"
                      optionLabel="nomeTabela" 
                      placeholder="Selecione a Tabela"
                      (onChange)="listarProcedimentos(this.tabelaSelecionada)" />
        </div>
        <div class="d-flex flex-column mb-3">
            <span>Procedimento</span>
            <p-autocomplete [dropdown]="true" 
                            [(ngModel)]="procedimentoSelecionado"
                            [suggestions]="procedimentosFiltrados" 
                            optionLabel="descricaoProcedimento"
                            (completeMethod)="filtrarProcedimentos($event)" />
        </div>
        <div class="d-flex flex-column">
            <span>Quantidade</span>
            <input type="number"class="col-2 me-2" pInputText [(ngModel)]="quantidadeProcedimento" />
        </div>
    </ng-template>
    <ng-template pTemplate="footer">
        <div class="d-flex flex-row">
            <p-button label="Fechar" severity="danger" (onClick)="fecharDialog()" class="me-3" />
            <p-button label="Inserir" severity="success" (onClick)="inserirProcedimento()" />
        </div>
    </ng-template>
</p-dialog>
